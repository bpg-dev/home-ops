---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app modded
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: modded
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3
  values:
    controllers:
      minecraft:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          00-fix-bluemap:
            image:
              repository: ghcr.io/home-operations/busybox
              tag: 1.38.0
            command:
              - /bin/sh
              - -lc
            args:
              - |
                set -euo pipefail
                mkdir -p /data/config/bluemap
                if [ ! -f /data/config/bluemap/core.conf ]; then
                  echo 'accept-download: true' > /data/config/bluemap/core.conf
                  exit 0
                fi
                sed -i 's/^accept-download: false$/accept-download: true/' /data/config/bluemap/core.conf || true
        containers:
          modded:
            image:
              repository: ghcr.io/itzg/minecraft-server
              tag: 2026.6.1-java25
            env:
              EULA: "true"
              TZ: America/Toronto
              TYPE: "FABRIC"
              VERSION: "26.2"
              ONLINE_MODE: false
              SERVER_NAME: *app
              DIFFICULTY: easy
              OPS: "MrPurgen,alix_kb"
              MAX_PLAYERS: 40
              KEEP_INVENTORY: true
              ENABLE_ROLLING_LOGS: false
              ALLOW_FLIGHT: true
              INIT_MEMORY: 1G
              MAX_MEMORY: &max-memory 12G
              MODRINTH_DOWNLOAD_DEPENDENCIES: required
              MODRINTH_PROJECTS: |
                bluemap
                fabric-api
                fabric-language-kotlin
                cloth-config
                cristel-lib
                forge-config-api-port
                balm
                jamlib
                clumps
                fallingtree
                rightclickharvest
                veinminer
            probes:
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25565
                  initialDelaySeconds: 30
                  periodSeconds: 10
                  failureThreshold: 60
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25565
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 25565
                  periodSeconds: 10
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 500m
                memory: *max-memory
        pod:
          securityContext:
            runAsUser: 568
            runAsGroup: 568
            runAsNonRoot: true
            fsGroup: 568
            fsGroupChangePolicy: OnRootMismatch
    service:
      modded:
        controller: minecraft
        annotations:
          mc-router.itzg.me/externalServerName: "modded.${SECRET_DOMAIN}"
        ports:
          game:
           port: &game-port 25565
          rcon:
           port: &rcon-port 25578
          http:
            port: &web-port 8100
    route:
      modded:
        hostnames: ["bluemap-modded.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - name: *app
                port: *web-port
            matches:
              - path:
                 type: PathPrefix
                 value: /
    persistence:
      tmp:
        type: emptyDir
      data:
        existingClaim: *app
        globalMounts:
          - path: /data
