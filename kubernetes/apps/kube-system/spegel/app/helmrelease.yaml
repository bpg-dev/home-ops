---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  chartRef:
    kind: OCIRepository
    name: spegel
  interval: 1h
  values:
    spegel:
      containerdSock: /run/containerd/containerd.sock
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
    # Chart defaults are 128Mi/128Mi which is too low during image pull spikes and causes OOMKilled.
    # CPU limit required: without it, libp2p DHT goes runaway (1.6+ cores) when a node has a large
    # containerd content store. 750m balances headroom for legitimate DHT rebuilds (e.g., after node
    # reboots) with preventing runaway behavior. See docs/SPEGEL_HIGH_CPU_INVESTIGATION.md
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 750m
        memory: 512Mi
    service:
      registry:
        hostPort: 29999
    serviceMonitor:
      enabled: true
    grafanaDashboard:
      enabled: true
